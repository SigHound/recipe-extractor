# Production-style stack: Caddy on the host proxies to 127.0.0.1:8080 (web container).
# Create backend/.env from backend/.env.example for API keys (optional but recommended).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: recipe
      POSTGRES_PASSWORD: recipe
      POSTGRES_DB: recipe
    volumes:
      - recipe_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipe -d recipe"]
      interval: 5s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  api:
    build: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://recipe:recipe@db:5432/recipe
      CORS_ORIGINS: https://recipe-extractor.kianoryan.com,http://localhost:5173,http://127.0.0.1:5173,http://127.0.0.1:8080,http://localhost:8080,http://localhost,http://127.0.0.1
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  recipe_pg_data:
